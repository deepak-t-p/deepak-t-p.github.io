<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Deepak TP — Developer, Engineer, Researcher. Personal portfolio.">
  <meta name="theme-color" content="#0a0a0a">
  <title>Deepak — Profile</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <div class="noise-overlay"></div>

  <!-- Top Navigation -->
  <nav class="nav-bar">
    <div class="nav-bar__inner">
      <a href="index.html" class="nav-bar__logo">
        <span class="nav-bar__logo-dot"></span> Deepak
      </a>
      <div class="nav-bar__links">
        <a href="index.html" class="active"><span class="nav-icon">⊙</span> Profile</a>
        <a href="projects.html"><span class="nav-icon">◧</span> Projects</a>
        <a href="github.html"><span class="nav-icon">⌥</span> GitHub</a>
        <a href="research.html"><span class="nav-icon">◈</span> Research</a>
        <a href="resume.html"><span class="nav-icon">▤</span> Resume</a>
        <a href="working.html"><span class="nav-icon">⟐</span> Working on</a>
        <a href="contact.html"><span class="nav-icon">✉</span> Contact</a>
      </div>
      <button class="theme-toggle" aria-label="Toggle theme">
        <span class="icon-sun">☀</span><span class="icon-moon">☾</span>
      </button>
    </div>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="index.html" class="active"><span class="nav-icon">⊙</span><span>Profile</span></a>
    <a href="projects.html"><span class="nav-icon">◧</span><span>Projects</span></a>
    <a href="github.html"><span class="nav-icon">⌥</span><span>GitHub</span></a>
    <a href="research.html"><span class="nav-icon">◈</span><span>Research</span></a>
    <a href="resume.html"><span class="nav-icon">▤</span><span>Resume</span></a>
    <a href="working.html"><span class="nav-icon">⟐</span><span>Working on</span></a>
    <a href="contact.html"><span class="nav-icon">✉</span><span>Contact</span></a>
  </nav>

  <!-- Page Body -->
  <div class="page-body">

    <div class="container">

      <!-- Profile Hero — populated from config.js -->
      <div class="widget profile-hero widget-reveal">
        <div class="profile-hero__avatar-wrap">
          <img src="" alt="" class="profile-hero__avatar" id="profileAvatar">
        </div>
        <h1 class="profile-hero__name" id="profileName"></h1>
        <p class="profile-hero__tagline">
          <span class="profile-hero__typing" id="typingText"></span><span class="profile-hero__cursor"></span>
        </p>
        <div class="social-row" id="socialLinks"></div>
      </div>

      <!-- Video — auto-hides if no video file exists -->
      <div class="widget video-widget widget-reveal" id="videoWidget">
        <div class="widget__header">Intro</div>
        <div class="video-widget__container">
          <video controls preload="metadata">
            <source src="assets/video/intro.mp4" type="video/mp4">
            <source src="assets/video/intro.webm" type="video/webm">
          </video>
          <div class="video-widget__placeholder">
            <div class="video-widget__placeholder-icon">▶</div>
            <div>Loading video...</div>
          </div>
        </div>
      </div>

      <!-- Bio — populated from config.js -->
      <div class="widget widget-reveal">
        <div class="widget__header">About</div>
        <div class="bio-widget__text" id="bioText"></div>
      </div>

      <!-- Education + Experience — populated from config.js -->
      <div class="two-col">
        <div class="widget widget-reveal">
          <div class="widget__header">Education</div>
          <div class="timeline" id="educationTimeline"></div>
        </div>
        <div class="widget widget-reveal">
          <div class="widget__header">Experience</div>
          <div class="timeline" id="experienceTimeline"></div>
        </div>
      </div>

      <footer class="site-footer">
        &copy; 2025 Deepak. All rights reserved.
      </footer>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
